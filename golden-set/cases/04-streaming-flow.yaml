id: streaming-flow
title: "Streaming as Flow<MessageStreamEvent>"
description: "스트리밍 응답을 Flow 로 노출한다. 콜백/이터레이터/채널 아님. when-exhaustive 를 위해 MessageStreamEvent 는 sealed."
prompt: |
  사용자가 토큰 단위 응답을 받아 화면에 실시간으로 찍고 싶다.
  반환 타입은 kotlinx.coroutines.flow.Flow<MessageStreamEvent>.
  이벤트 타입은 sealed class 라서 when 으로 모든 케이스를 exhaustive 하게 처리할 수 있어야 한다.
expected_api:
  imports:
    - com.sendbird.anthropic.streamMessage
    - com.sendbird.anthropic.Model
    - com.sendbird.anthropic.Message
    - com.sendbird.anthropic.MessageStreamEvent
    - kotlinx.coroutines.flow.collect
  context: suspend
  snippet: |
    client.streamMessage(
        model = Model.CLAUDE_OPUS_4_7,
        maxTokens = 1024,
        messages = listOf(Message.user("긴 답변 줘")),
    ).collect { event ->
        when (event) {
            is MessageStreamEvent.ContentBlockDelta -> print(event.delta.text)
            is MessageStreamEvent.MessageStop -> println("\n[end]")
            else -> {}
        }
    }
criteria:
  - id: streammessage-returns-flow
    check: static
    description: "streamMessage 반환 타입이 Flow<MessageStreamEvent> 여야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "fun.*streamMessage.*:\\s*Flow<MessageStreamEvent>"
  - id: messagestreamevent-sealed
    check: static
    description: "MessageStreamEvent 는 sealed class 또는 sealed interface 여야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "sealed (class|interface) MessageStreamEvent"
  - id: contentblockdelta-subtype
    check: static
    description: "MessageStreamEvent.ContentBlockDelta 서브타입이 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(class|object|data class) ContentBlockDelta.*:\\s*MessageStreamEvent"
  - id: messagestop-subtype
    check: static
    description: "MessageStreamEvent.MessageStop 서브타입이 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(class|object|data class) MessageStop.*:\\s*MessageStreamEvent"
  - id: no-iterator-stream
    check: static
    description: "streamMessage 가 Iterator 나 Sequence 를 반환해선 안 된다"
    grep_must_not_match:
      path: sdk/src/main/kotlin
      pattern: "fun.*streamMessage.*:\\s*(Iterator|Sequence)<"
