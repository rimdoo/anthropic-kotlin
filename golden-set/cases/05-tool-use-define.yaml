id: tool-use-define
title: "Tool declaration + parsing tool_use response"
description: "도구를 선언하여 messages 에 함께 보내고, Claude 가 ToolUse 블록으로 응답하면 sealed ContentBlock 을 filterIsInstance 로 안전하게 꺼낸다."
prompt: |
  사용자가 get_weather 같은 도구를 선언해서 Claude 에 넘긴다.
  Claude 는 ToolUse 블록을 포함한 응답을 돌려준다.
  사용자는 ContentBlock 이 sealed 라는 점을 활용해 filterIsInstance<ContentBlock.ToolUse>() 한 줄로 꺼낸다.
  Tool 의 input schema 는 jsonSchema { property(...) } DSL 로 builder 없이 작성한다.
expected_api:
  imports:
    - com.sendbird.anthropic.createMessage
    - com.sendbird.anthropic.Model
    - com.sendbird.anthropic.Message
    - com.sendbird.anthropic.Tool
    - com.sendbird.anthropic.jsonSchema
    - com.sendbird.anthropic.ContentBlock
  context: suspend
  snippet: |
    val weatherTool = Tool(
        name = "get_weather",
        description = "현재 날씨 조회",
        inputSchema = jsonSchema {
            property("city", type = "string", required = true)
        },
    )
    val response = client.createMessage(
        model = Model.CLAUDE_OPUS_4_7,
        maxTokens = 1024,
        tools = listOf(weatherTool),
        messages = listOf(Message.user("서울 날씨는?")),
    )
    val toolUse = response.content.filterIsInstance<ContentBlock.ToolUse>().first()
    println("${toolUse.name}(${toolUse.input})")
criteria:
  - id: tool-constructor
    check: static
    description: "Tool 은 builder 없이 생성자 (또는 함수형 팩토리) 로 만들 수 있어야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(class|data class) Tool\\("
  - id: jsonschema-dsl
    check: static
    description: "jsonSchema { ... } DSL 함수가 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "fun jsonSchema\\("
  - id: contentblock-sealed
    check: static
    description: "ContentBlock 은 sealed class 또는 sealed interface 여야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "sealed (class|interface) ContentBlock"
  - id: contentblock-tooluse-subtype
    check: static
    description: "ContentBlock.ToolUse 서브타입이 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(class|object|data class) ToolUse.*:\\s*ContentBlock"
  - id: tools-param-optional
    check: static
    description: "createMessage 의 tools 파라미터는 default null/empty 로 optional"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "tools:\\s*List<Tool>\\??\\s*=\\s*(null|emptyList\\(\\))"
