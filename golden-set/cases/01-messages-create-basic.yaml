id: messages-create-basic
title: "Basic message creation"
description: "단일 user 메시지를 보내고 응답을 받는 가장 단순한 케이스. builder 체인 없이 named parameter 만으로 호출 가능해야 한다."
prompt: |
  사용자가 단 한 줄의 user 메시지를 보내고 assistant 의 텍스트 응답을 받고 싶다.
  Java SDK 의 MessageCreateParams.builder().model(...).maxTokens(...).build() 같은
  체인 없이, Kotlin 의 named parameter 만으로 호출이 끝나야 한다.
expected_api:
  imports:
    - com.anthropic.client.okhttp.AnthropicOkHttpClient
    - com.sendbird.anthropic.createMessage
    - com.sendbird.anthropic.Model
    - com.sendbird.anthropic.Message
  context: suspend
  snippet: |
    val client = AnthropicOkHttpClient.builder()
        .apiKey(System.getenv("ANTHROPIC_API_KEY"))
        .build()
    val response = client.createMessage(
        model = Model.CLAUDE_OPUS_4_7,
        maxTokens = 1024,
        messages = listOf(Message.user("안녕")),
    )
    println(response.text)
criteria:
  - id: suspend-create
    check: static
    description: "createMessage 는 suspend fun 이어야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "suspend fun.*AnthropicClient\\.createMessage"
  - id: no-completable-future-leak
    check: static
    description: "public API 에 CompletableFuture 가 노출되어선 안 된다"
    grep_must_not_match:
      path: sdk/src/main/kotlin
      pattern: "^(?!.*private).*:\\s*CompletableFuture"
  - id: no-optional-leak
    check: static
    description: "public API 에 java.util.Optional 가 노출되어선 안 된다"
    grep_must_not_match:
      path: sdk/src/main/kotlin
      pattern: "^(?!.*private).*:\\s*Optional<"
  - id: response-text-convenience
    check: static
    description: "MessageResponse 에 첫 텍스트 블록을 꺼내는 .text 편의 프로퍼티가 있어야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "val MessageResponse\\.text|val.*MessageResponse.*\\.text"
