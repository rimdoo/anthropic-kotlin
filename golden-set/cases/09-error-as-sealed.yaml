id: error-as-sealed
title: "AnthropicException as sealed hierarchy"
description: "API 호출 실패를 단일 RuntimeException 이 아닌 sealed AnthropicException 으로 노출. when 으로 RateLimit/Auth/BadRequest/Server 분기 처리 가능."
prompt: |
  사용자가 호출 실패를 타입 안전하게 분기 처리하고 싶다.
  rate limit 이면 retry-after 를 읽고, auth 면 즉시 종료, bad request 면 메시지 출력.
  Java SDK 의 단일 AnthropicException 을 wrap 해서 sealed class 로 재포장한다.
  Retry-After 헤더 값은 RateLimit 서브타입의 retryAfter 프로퍼티 (kotlin.time.Duration) 로 노출.
expected_api:
  imports:
    - com.sendbird.anthropic.createMessage
    - com.sendbird.anthropic.Model
    - com.sendbird.anthropic.Message
    - com.sendbird.anthropic.AnthropicException
  context: suspend
  snippet: |
    val result = runCatching {
        client.createMessage(
            model = Model.CLAUDE_OPUS_4_7,
            maxTokens = 1024,
            messages = listOf(Message.user("hi")),
        )
    }
    result.onFailure { e ->
        when (e) {
            is AnthropicException.RateLimit -> println("retry after ${e.retryAfter}")
            is AnthropicException.Auth -> error("API key invalid")
            is AnthropicException.BadRequest -> println(e.message)
            else -> throw e
        }
    }
criteria:
  - id: anthropic-exception-sealed
    check: static
    description: "AnthropicException 은 sealed class 여야 한다 (Throwable 상속)"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "sealed class AnthropicException.*:\\s*(RuntimeException|Exception|Throwable)"
  - id: ratelimit-subtype
    check: static
    description: "AnthropicException.RateLimit 서브타입이 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(class|data class) RateLimit.*:\\s*AnthropicException"
  - id: ratelimit-retry-after
    check: static
    description: "RateLimit 은 retryAfter: Duration 프로퍼티를 가진다 (kotlin.time.Duration)"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "\\bretryAfter:\\s*Duration\\b"
  - id: auth-subtype
    check: static
    description: "AnthropicException.Auth 서브타입이 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(class|object|data class) Auth.*:\\s*AnthropicException"
  - id: badrequest-subtype
    check: static
    description: "AnthropicException.BadRequest 서브타입이 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(class|data class) BadRequest.*:\\s*AnthropicException"
