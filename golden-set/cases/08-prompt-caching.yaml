id: prompt-caching
title: "Prompt caching on system block"
description: "긴 system 컨텍스트를 ephemeral cache 로 표시해 재호출 시 캐시 히트를 노린다. systemPrompt { text(..., cache = ...) } DSL 과 CacheControl sealed type 이 핵심."
prompt: |
  사용자가 매우 긴 system 컨텍스트 (수천 토큰) 를 반복 호출 사이에 캐시하고 싶다.
  systemPrompt { text("...", cache = CacheControl.Ephemeral) } DSL 로 캐시 표시를 명시한다.
  응답의 usage 에는 cacheReadInputTokens / cacheCreationInputTokens 같은 캐시 통계가 있어야 한다.
expected_api:
  imports:
    - com.sendbird.anthropic.createMessage
    - com.sendbird.anthropic.Model
    - com.sendbird.anthropic.Message
    - com.sendbird.anthropic.systemPrompt
    - com.sendbird.anthropic.CacheControl
  context: suspend
  snippet: |
    val response = client.createMessage(
        model = Model.CLAUDE_OPUS_4_7,
        maxTokens = 1024,
        system = systemPrompt {
            text("긴 컨텍스트...", cache = CacheControl.Ephemeral)
        },
        messages = listOf(Message.user("질문")),
    )
    println(response.usage.cacheReadInputTokens)
criteria:
  - id: system-prompt-dsl
    check: static
    description: "systemPrompt { ... } DSL 함수가 존재해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "fun systemPrompt\\("
  - id: cachecontrol-sealed
    check: static
    description: "CacheControl 은 sealed class/interface 여야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "sealed (class|interface) CacheControl"
  - id: cachecontrol-ephemeral
    check: static
    description: "CacheControl.Ephemeral 가 존재해야 한다 (object 또는 data class)"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "(object|class|data class) Ephemeral.*:\\s*CacheControl|CacheControl.*\\.Ephemeral"
  - id: system-prompt-overload
    check: static
    description: "createMessage 가 system: SystemPrompt 오버로드를 노출해야 한다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "system:\\s*SystemPrompt"
  - id: usage-cache-read-tokens
    check: static
    description: "Usage 객체에 cacheReadInputTokens 프로퍼티가 노출된다"
    grep_must_match:
      path: sdk/src/main/kotlin
      pattern: "\\bcacheReadInputTokens\\b"
